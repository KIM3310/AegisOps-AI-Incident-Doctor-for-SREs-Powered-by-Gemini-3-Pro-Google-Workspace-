name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Prepare test artifact directory
        run: mkdir -p artifacts

      - name: Dependency audit (high+)
        run: npm audit --audit-level=high

      - name: Typecheck
        run: npm run typecheck

      - name: Unit Tests
        run: npm test

      - name: Replay eval proof
        run: npm run eval:replays -- --json-out artifacts/replay-overview.json

      - name: Review surface smoke
        run: npm run review:smoke -- --json-out artifacts/review-surface-smoke.json

      - name: Build
        run: npm run build

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: aegisops-proof-artifacts
          path: |
            artifacts/replay-overview.json
            artifacts/review-surface-smoke.json

  review-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: AdSense/Cloudflare quality gate
        run: bash tools/release_ops.sh check
